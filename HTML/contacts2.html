<html>
<head>
    <title>Web Contact</title>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function() {
            readCookie();
            searchContact(""); // load all contacts immediately
        }, false);
    </script>
    <style>
        body {
            background-image: url('images/Background1.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1 id="title">Web Contact</h1>

    <div id="loggedInDiv">
        <span id="userName"></span><br />
        <button type="button" id="logoutButton" class="buttons" onclick="doLogout();"> Log Out </button>
    </div>

    <!-- MAIN INTERFACE CONTAINER -->
    <div id="accessUIDiv">
        <!-- Added form-input class to Search -->
        <input type="text" id="searchText" class="form-input" onkeyup="searchContact()" onclick="searchContact();" placeholder="Search contacts">

        <table id="contactTable">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone Number</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="contactTableBody"></tbody>
        </table>
        <span id="contactSearchResult"></span>

        <span id="contactDeleteResult"></span>

        <!-- ADD CONTACT FIELDS (All sharing the form-input class now) -->
        <input type="text" id="contactAddFirst" class="form-input" placeholder="First Name">
        <input type="text" id="contactAddLast" class="form-input" placeholder="Last Name">
        <input type="text" id="contactAddPhone" class="form-input" placeholder="Phone Number">
        <input type="text" id="contactAddEmail" class="form-input" placeholder="Email">

        <button type="button" id="addContactButton" class="buttons" onclick="addContact();"> Add Contact </button>
        <span id="contactAddResult"></span>
    </div>

    <!-- EDIT MODAL POPUP -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Contact</h2>
            <input type="hidden" id="editID">
            <!-- Added form-input class and cleaned line breaks -->
            <input type="text" id="editFirstName" class="form-input" placeholder="First Name">
            <input type="text" id="editLastName" class="form-input" placeholder="Last Name">
            <input type="text" id="editPhoneNumber" class="form-input" placeholder="Phone Number">
            <input type="text" id="editEmail" class="form-input" placeholder="Email">

            <!-- Styled modal buttons to match your standard buttons class -->
            <button class="buttons" onclick="saveEdit()">Save</button>
            <button class="buttons" onclick="closeEditModal()">Cancel</button>
            <span id="editResult"></span>
        </div>
    </div>
</body>
</html>
