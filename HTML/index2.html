<html>
<head>
        <title>Web Contact</title>
        <script type="text/javascript" src="js/md5.js"></script>
        <script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
</head>
<body>

<style>
    body {
      background-image: url('images/Background1.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
  </style>


<h1 id="title">Web Contact</h1>

 <div id="registerDiv">
        <span class="inner-title">REGISTER</span>
        <!-- Added class="form-input" to all inputs below -->
        <input type="text" id="registerFirst" class="form-input" placeholder="First Name">
        <input type="text" id="registerLast" class="form-input" placeholder="Last Name">
        <input type="text" id="registerLogin" class="form-input" placeholder="Username">
        <input type="password" id="registerPassword" class="form-input" placeholder="Password">
        <button type="button" id="registerButton" class="buttons" onclick="doRegister();">Register</button>
        <span id="registerResult"></span>
    </div>

    <!-- LOGIN CONTAINER -->
    <div id="loginDiv">
        <span class="inner-title">PLEASE LOG IN</span>
        <!-- Added class="form-input" and removed old <br /> tags -->
        <input type="text" id="loginName" class="form-input" placeholder="Username" />
        <input type="password" id="loginPassword" class="form-input" placeholder="Password"/>
        <button type="button" id="loginButton" class="buttons" onclick="doLogin();">Log In</button>
        <span id="loginResult"></span>
    </div>
</body>


</body>
</html>
