<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContactVault — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="text/javascript" src="js/code.js"></script>
  <link href="css/styles.css" rel="stylesheet">
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      readCookie();
      searchContact("");
    }, false);
  </script>
</head>
<body class="dashboard-page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="var(--accent)"/>
          <path d="M8 10h16M8 16h10M8 22h13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="24" cy="22" r="4" fill="var(--accent)" stroke="white" stroke-width="2"/>
        </svg>
      </div>
      <span class="sidebar-brand-name">ContactVault</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link sidebar-link--active">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="10" y="2" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="2" y="10" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="10" y="10" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        Contacts
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <span class="user-name" id="userName">Loading...</span>
          <span class="user-role">Account holder</span>
        </div>
      </div>
      <button type="button" class="btn btn--ghost btn--sm sidebar-logout" onclick="doLogout()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Log out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="dashboard-main" id="accessUIDiv">

    <header class="dash-header">
      <div>
        <h1 class="dash-title">My Contacts</h1>
        <p class="dash-subtitle" id="contactCount">Loading...</p>
      </div>
      <button type="button" class="btn btn--primary" onclick="openAddModal()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Add Contact
      </button>
    </header>

    <!-- SEARCH BAR -->
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.8"/><path d="M13 13l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" id="searchText" class="search-input" placeholder="Search by name, email, or phone…" onkeyup="searchContact(this.value)">
    </div>

    <!-- FEEDBACK MESSAGES -->
    <span id="contactSearchResult" class="dash-msg"></span>
    <span id="contactDeleteResult" class="dash-msg"></span>
    <span id="contactAddResult" class="dash-msg"></span>

    <!-- CONTACTS TABLE -->
    <div class="table-wrapper">
      <table id="contactTable" class="contacts-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="contactTableBody">
          <tr class="table-empty-row">
            <td colspan="4">
              <div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="14" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                <p>Loading contacts…</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

  <!-- ══════════════════════════════════════
       ADD CONTACT MODAL
  ══════════════════════════════════════ -->
  <div id="addModal" class="modal-overlay" onclick="closeAddModal(event)">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Add New Contact</h2>
        <button type="button" class="modal-close" onclick="closeAddModal()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3l12 12M15 3L3 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">First Name</label>
            <input type="text" id="contactAddFirst" class="field-input" placeholder="Jane">
          </div>
          <div class="field-group">
            <label class="field-label">Last Name</label>
            <input type="text" id="contactAddLast" class="field-input" placeholder="Doe">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Phone Number</label>
          <input type="text" id="contactAddPhone" class="field-input" placeholder="(555) 000-0000">
        </div>
        <div class="field-group">
          <label class="field-label">Email</label>
          <input type="text" id="contactAddEmail" class="field-input" placeholder="jane@example.com">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn--ghost" onclick="closeAddModal()">Cancel</button>
        <button type="button" class="btn btn--primary" onclick="addContact()">
          Add Contact
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       EDIT CONTACT MODAL
  ══════════════════════════════════════ -->
  <div id="editModal" class="modal-overlay" onclick="closeEditModal(event)">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Edit Contact</h2>
        <button type="button" class="modal-close" onclick="closeEditModal()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3l12 12M15 3L3 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editID">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">First Name</label>
            <input type="text" id="editFirstName" class="field-input" placeholder="First Name">
          </div>
          <div class="field-group">
            <label class="field-label">Last Name</label>
            <input type="text" id="editLastName" class="field-input" placeholder="Last Name">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Phone Number</label>
          <input type="text" id="editPhoneNumber" class="field-input" placeholder="Phone Number">
        </div>
        <div class="field-group">
          <label class="field-label">Email</label>
          <input type="text" id="editEmail" class="field-input" placeholder="Email">
        </div>
        <span id="editResult" class="dash-msg"></span>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn--ghost" onclick="closeEditModal()">Cancel</button>
        <button type="button" class="btn btn--primary" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    // ── Add Modal helpers ──────────────────────────────────────
    function openAddModal() {
      document.getElementById('addModal').classList.add('modal-overlay--open');
    }
    function closeAddModal(e) {
      if (!e || e.target === document.getElementById('addModal')) {
        document.getElementById('addModal').classList.remove('modal-overlay--open');
      }
    }

    // ── Override closeEditModal to support backdrop click ──────
    const _origClose = window.closeEditModal;
    window.closeEditModal = function(e) {
      if (!e || e.target === document.getElementById('editModal')) {
        document.getElementById('editModal').classList.remove('modal-overlay--open');
      }
    };

    // ── Patch openEditModal so it uses class instead of style ──
    // code.js calls document.getElementById('editModal').style.display = 'flex'
    // We intercept with a MutationObserver to keep our class in sync
    const editModal = document.getElementById('editModal');
    const observer = new MutationObserver(() => {
      if (editModal.style.display === 'flex' || editModal.style.display === 'block') {
        editModal.classList.add('modal-overlay--open');
        editModal.style.display = '';
      }
    });
    observer.observe(editModal, { attributes: true, attributeFilter: ['style'] });

    // ── After addContact() succeeds, close the add modal ──────
    const _origAdd = window.addContact;
    // We'll patch via the result span watcher
    const addResult = document.getElementById('contactAddResult');
    if (addResult) {
      new MutationObserver(() => {
        const txt = addResult.textContent || '';
        if (txt && !txt.toLowerCase().includes('error') && txt.trim() !== '') {
          setTimeout(() => {
            closeAddModal();
            document.getElementById('contactAddFirst').value = '';
            document.getElementById('contactAddLast').value = '';
            document.getElementById('contactAddPhone').value = '';
            document.getElementById('contactAddEmail').value = '';
          }, 600);
        }
      }).observe(addResult, { childList: true, subtree: true, characterData: true });
    }
  </script>
</body>
</html>

<div id="accessUIDiv">
	<br />

	<input type="text" id="searchText" onkeyup="searchContact()" placeholder="Search contacts">
	<table id="contactTable">	
		<thead>
			<tr>
				<th>First Name</th>
				<th>Last Name</th>
				<th>Email</th>
				<th>Phone Number</th>
				<th>Actions</th>
			</tr>
		</thead>
		<tbody id="contactTableBody"></tbody>
	</table>
	
	<span id="contactSearchResult"></span>
	<br /><br />
	
	<span id="contactDeleteResult"></span>

	<input type="text" id="contactAddFirst" placeholder="First Name">
	<input type="text" id="contactAddLast" placeholder="Last Name">
	<input type="text" id="contactAddPhone" placeholder="Phone Number">
	<input type="text" id="contactAddEmail" placeholder="Email">
	<button type="button" id="addContactButton" class="buttons" onclick="addContact();"> Add Contact </button><br />
	<span id="contactAddResult"></span>
</div>


<!--This is for the edit menu that pops up-->
<div id="editModal" class="modal">
	<div class="modal-content">
		<h2>Edit Contact</h2>

		<input type="hidden" id="editID">

		<input type="text" id="editFirstName" placeholder="First Name"><br>
		<input type="text" id="editLastName" placeholder="Last Name"><br>
		<input type="text" id="editPhoneNumber" placeholder="Phone Number"><br>
		<input type="text" id="editEmail" placeholder="Email"><br><br>

		<button onclick="saveEdit()">Save</button>
		<button onclick="closeEditModal()">Cancel</button>

		<br><br>
		<span id="editResult"></span>
	</div>
</div>

</body>
</html>
